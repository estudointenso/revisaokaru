<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REVISÃO KARU</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3d;
    --text: #e8eaf2;
    --text-muted: #6b7191;
    --text-dim: #3d4260;
    --green: #2ecc8a;
    --green-bg: #0d2b1e;
    --green-border: #1a4d35;
    --red: #ff5f6d;
    --red-bg: #2b0d12;
    --red-border: #4d1a1f;
    --accent: #7c8cf8;
    --accent-dim: #2a2f55;
    --orange: #f5a623;
    --orange-bg: #2b1f0d;
    --orange-border: #4d3a1a;
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: fixed;
    width: 100%;
    font-size: 20px;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 16px) 20px env(safe-area-inset-bottom, 16px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  .btn {
    border: none;
    border-radius: var(--radius);
    padding: 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s, opacity .15s;
    width: 100%;
  }
  .btn:active { transform: scale(0.97); opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    font-size: 19px;
    padding: 14px;
  }

  #screen-loading { justify-content: center; align-items: center; gap: 20px; text-align: center; }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #screen-loading p { color: var(--text-muted); font-size: 20px; }

  #screen-review { gap: 0; padding-bottom: 0; overflow-y: auto; }

  .review-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
    flex-shrink: 0;
  }
  .review-counter { font-size: 19px; font-weight: 600; color: var(--text-muted); }
  .review-counter span { color: var(--text); }

  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    flex-shrink: 0;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px;
    transition: width .4s ease;
  }

  .card-area {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1200px;
    padding: 8px 0;
  }

  .flip-card {
    width: 100%;
    max-width: 440px;
    height: 540px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .flip-card.flipped { transform: rotateY(180deg); }
  .flip-card.exit-left {
    transform: translateX(-80px) rotate(-5deg);
    opacity: 0;
    transition: transform .22s ease, opacity .22s ease;
  }
  .flip-card.exit-right {
    transform: translateX(80px) rotate(5deg);
    opacity: 0;
    transition: transform .22s ease, opacity .22s ease;
  }
  .flip-card.enter-right {
    transform: translateX(80px) rotate(5deg);
    opacity: 0;
    transition: none;
  }
  .flip-card.enter-left {
    transform: translateX(-80px) rotate(-5deg);
    opacity: 0;
    transition: none;
  }

  .card-face {
    position: absolute;
    inset: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
  }
  .card-back {
    transform: rotateY(180deg);
    background: var(--surface2);
    border-color: var(--accent);
    justify-content: safe center;
  }
  .card-face-content {
    font-size: 24px;
    line-height: 1.5;
    color: var(--text);
    font-weight: 400;
    text-align: center;
  }
  .card-front .card-face-content {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--accent);
  }
  .card-tap-hint {
    font-size: 15px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    justify-content: center;
  }
  .card-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    width: fit-content;
  }
  .badge-novo { background: var(--accent-dim); color: var(--accent); }
  .badge-revisao { background: var(--green-bg); color: var(--green); }
  .badge-futuro { background: #1a2b2b; color: #4ecdc4; border: 1px solid #2a4a4a; }

  .card-img {
    max-width: 100%;
    max-height: 220px;
    object-fit: contain;
    border-radius: var(--radius-sm);
    margin: 8px auto 0;
    display: block;
    cursor: zoom-in;
  }

  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.active { display: flex; }
  #lightbox img {
    max-width: 95vw;
    max-height: 95vh;
    object-fit: contain;
    border-radius: var(--radius-sm);
  }

  .eval-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 8px 0 max(12px, env(safe-area-inset-bottom));
    flex-shrink: 0;
    transition: opacity .3s ease;
  }
  .eval-buttons.hidden { display: none; }

  .btn-eval {
    border: none;
    border-radius: var(--radius);
    padding: 16px 16px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: transform .15s, filter .15s;
  }
  .btn-eval:active { transform: scale(0.95); }
  .btn-eval .eval-icon { font-size: 28px; }
  .btn-eval .eval-label { font-size: 18px; }
  .btn-lembrei { background: var(--green-bg); border: 1.5px solid var(--green-border); color: var(--green); }
  .btn-lembrei:active { filter: brightness(1.2); }
  .btn-nao-lembrei { background: var(--red-bg); border: 1.5px solid var(--red-border); color: var(--red); }
  .btn-nao-lembrei:active { filter: brightness(1.2); }

  #screen-summary {
    gap: 14px;
    padding-top: 32px;
    overflow-y: auto;
  }

  .summary-header { text-align: center; flex-shrink: 0; }
  .summary-header h2 { font-family: 'DM Serif Display', serif; font-size: 40px; }
  .summary-header p { color: var(--text-muted); font-size: 19px; margin-top: 6px; }

  .summary-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex-shrink: 0; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
  }
  .stat-number { font-family: 'DM Serif Display', serif; font-size: 48px; line-height: 1; }
  .stat-number.green { color: var(--green); }
  .stat-number.red { color: var(--red); }
  .stat-label { font-size: 15px; color: var(--text-muted); margin-top: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; }

  .summary-pct {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    flex-shrink: 0;
  }
  .pct-bar-bg { height: 10px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin: 12px 0 10px; }
  .pct-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease, background-color 0.5s ease; }
  .pct-label { display: flex; justify-content: space-between; font-size: 18px; color: var(--text-muted); }
  .pct-label strong { color: var(--text); font-size: 20px; }

  .summary-historico {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    flex-shrink: 0;
  }
  .hist-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .hist-media { font-size: 22px; font-weight: 600; color: var(--accent); }
  .hist-dias { font-size: 18px; color: var(--text-muted); margin-top: 2px; }

  .hist-bars {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 200px;
    margin-top: 14px;
  }
  .hist-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }
  .hist-bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    min-height: 4px;
  }
  .hist-bar-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  .summary-syncing {
    text-align: center; font-size: 18px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    flex-shrink: 0;
  }

  .summary-actions {
    display: flex; flex-direction: column; gap: 10px;
    margin-top: auto;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    flex-shrink: 0;
  }

  .toast {
    position: fixed; bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 14px 24px; border-radius: 30px;
    font-size: 18px; opacity: 0; transition: all .3s ease; white-space: nowrap; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #block-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
  }
  #block-overlay.active { display: block; }

  .img-retry-btn {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    background: var(--surface2);
    color: var(--text-muted);
    margin: 8px auto;
    display: block;
    transition: transform .15s, filter .15s;
  }

  .img-retry-btn:active {
    transform: scale(0.95);
    filter: brightness(1.2);
  }

</style>
</head>
<body>

<div class="screen active" id="screen-loading">
  <div class="spinner"></div>
  <p id="loading-msg">Carregando itens do dia…</p>
</div>

<div class="screen" id="screen-inicio">
  <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:24px;">
    <h2 style="font-family:'DM Serif Display',serif; font-size:48px; color:var(--accent);">Revisão Karu</h2>
    <p style="color:var(--text-muted); font-size:20px;" id="inicio-data"></p>
  </div>
  <div style="padding-bottom: max(16px, env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:10px;">
      <button class="btn btn-primary" onclick="iniciarRevisaoDiaria()">📖 Revisar</button>
      <button class="btn btn-primary" onclick="mostrarResumo()">📊 Histórico</button>
  </div>
</div>

<div class="screen" id="screen-review">
  <div class="review-header">
    <div class="review-counter"><span id="counter-atual">1</span> de <span id="counter-total">0</span></div>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="card-area">
    <div class="flip-card" id="flip-card" onclick="virarCard()">
      <div class="card-face card-front">
        <div class="card-badge" id="card-badge-front"></div>
        <div class="card-face-content" id="card-tema">—</div>
        <div class="card-tap-hint">👆 TOQUE PARA SABER MAIS 👆</div>
      </div>
      <div class="card-face card-back">
        <div class="card-face-content" id="card-text">—</div>
        <img class="card-img" id="card-img-item" src="" alt="" style="display:none" onclick="abrirLightbox(event, this.src)">
      </div>
    </div>
  </div>
  <div id="btn-ver-imagem-wrap" style="display:none; padding: 8px 0 0; text-align:center;">
    <button class="btn btn-primary" onclick="abrirLightbox(event, document.getElementById('lightbox-img-tema-src').value)">VER IMAGEM</button>
    <input type="hidden" id="lightbox-img-tema-src" value="">
  </div>
  <div class="eval-buttons hidden" id="eval-buttons">
    <button class="btn-eval btn-nao-lembrei" onclick="avaliar('nao')">
      <span class="eval-icon">🔁</span>
      <span class="eval-label">Repetir</span>
    </button>
    <button class="btn-eval btn-lembrei" onclick="avaliar('sim')">
      <span class="eval-icon">⭐</span>
      <span class="eval-label">Decorei</span>
    </button>
  </div>
  <div style="padding: 0 0 max(16px, env(safe-area-inset-bottom));">
    <button class="btn btn-ghost" onclick="voltarAoMenu()">← Voltar ao menu</button>
  </div>
</div>

<div class="screen" id="screen-summary">
  <div class="summary-header">
    <h2 id="summary-emoji">✅ Revisão concluída!</h2>
    <p id="summary-data"></p>
  </div>
  <div class="summary-stats">
    <div class="stat-card">
      <div class="stat-number green" id="stat-lembrei">0</div>
      <div class="stat-label">Decorei</div>
    </div>
    <div class="stat-card">
      <div class="stat-number red" id="stat-nao">0</div>
      <div class="stat-label">Repetir</div>
    </div>
  </div>
  <div class="summary-pct">
    <div class="pct-label">
      <span>Hoje</span>
      <strong id="pct-valor">0%</strong>
    </div>
    <div class="pct-bar-bg">
      <div class="pct-bar-fill" id="pct-bar" style="width:0%"></div>
    </div>
    <div class="pct-label"><span id="pct-msg">—</span></div>
  </div>
  <div class="summary-historico" id="bloco-historico" style="display:none">
    <div class="hist-title">
      <span>📊 Histórico</span>
      <span class="hist-media" id="hist-media">—</span>
    </div>
    <div class="hist-dias" id="hist-dias">—</div>
    <div class="hist-bars" id="hist-bars"></div>
  </div>
  <div class="summary-syncing" id="sync-status"></div>
  <div class="summary-actions">
      <button class="btn btn-primary" id="btn-voltar-menu" style="display:none" onclick="voltarAoMenu()">← Voltar ao menu</button>
  </div>
</div>

<div class="screen" id="screen-erro">
  <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:24px; text-align:center; padding:0 32px;">
    <div style="font-size:64px;">⚠️</div>
    <h2 style="font-family:'DM Serif Display',serif; font-size:32px; color:var(--text);">Falha na conexão</h2>
    <p style="color:var(--text-muted); font-size:20px; line-height:1.5;">Verifique se sua internet está funcionando e tente novamente.</p>
  </div>
  <div style="padding-bottom: max(16px, env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:10px;">
    <button class="btn btn-primary" onclick="carregarItens()">🔄 Tentar novamente</button>
    <button class="btn btn-ghost" onclick="location.reload()">← Voltar</button>
  </div>
</div>

<div id="lightbox" onclick="fecharLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<div id="block-overlay"></div>

<div class="toast" id="toast"></div>

<script>
const APP_URL = 'https://script.google.com/macros/s/AKfycbymffK7phd3WRnxArNHXTlXJu23RdJtGSGncxAXq8kY520l_5wUEyeb91koMij4ask1xQ/exec';

// ── Chaves do localStorage ──
const APP_ID = APP_URL.split('/').slice(-2)[0]; // extrai o ID único da URL

let itens = [];
let idx = 0;
let resultados = [];
let cardVirado = false;
let animando = false;

function hojeStr() {
  return new Date().toISOString().slice(0, 10);
}

// ───────────────────────────────────────────────────────────────
// NAVEGAÇÃO DE TELAS
// ───────────────────────────────────────────────────────────────
function mostrarTela(id) {
  document.getElementById('block-overlay').classList.remove('active');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function embaralhar(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function mostrarErroConexao() {
  mostrarTela('screen-erro');
}

function configurarRetryImagem(imgElement, srcOriginal) {
  imgElement.onerror = function() {
    this.style.display = 'none';
    
    const parentContainer = this.parentElement;
    let retryBtn = parentContainer.querySelector('.img-retry-btn');
    
    if (!retryBtn) {
      retryBtn = document.createElement('button');
      retryBtn.className = 'img-retry-btn';
      retryBtn.innerHTML = '🔄 Tentar carregar imagem';
      retryBtn.onclick = (e) => {
        e.stopPropagation();
        retryBtn.remove();
        imgElement.style.display = 'block';
        imgElement.src = srcOriginal + '?t=' + Date.now();
      };
      parentContainer.appendChild(retryBtn);
    }
  };
  
  imgElement.onload = function() {
    this.style.display = 'block';
    const retryBtn = this.parentElement.querySelector('.img-retry-btn');
    if (retryBtn) retryBtn.remove();
  };
}

// ───────────────────────────────────────────────────────────────
// CARREGAMENTO INICIAL
// ───────────────────────────────────────────────────────────────
async function carregarItens() {
  mostrarTela('screen-loading');
  document.getElementById('loading-msg').textContent = 'Carregando itens do dia…';

  try {
    const [resItens, resSummary] = await Promise.all([
      fetch(`${APP_URL}?action=getItens`, { method: 'GET' }),
      fetch(`${APP_URL}?action=getSummary`, { method: 'GET' })
    ]);
    const dataItens   = await resItens.json();
    const dataSummary = await resSummary.json();

    resultados = (dataSummary.avaliacoes || []).map(a => ({ id: a.id, avaliacao: a.avaliacao }));
    itens = dataItens.itens || [];
    idx = 0;

    const historico = dataSummary.historico || [];
    const ontem = new Date();
    ontem.setDate(ontem.getDate() - 1);
    const ontemStr = `${String(ontem.getDate()).padStart(2,'0')}/${String(ontem.getMonth()+1).padStart(2,'0')}/${ontem.getFullYear()}`;
    const diaAnterior = historico.find(h => h.data === ontemStr);

    let msgInicio = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
    if (diaAnterior && diaAnterior.pct > 0) {
      const dataFmt = `${String(ontem.getDate()).padStart(2,'0')}/${String(ontem.getMonth()+1).padStart(2,'0')}/${ontem.getFullYear()}`;
      let frase = '';
      if (diaAnterior.pct >= 90)      frase = 'você teve um desempenho excelente! Você é uma máquina de estudar.';
      else if (diaAnterior.pct >= 70) frase = 'você teve um ótimo desempenho! Continue nesse ritmo.';
      else if (diaAnterior.pct >= 50) frase = 'você teve um desempenho regular. Tente intensificar mais o estudo.';
      else                             frase = 'você teve um desempenho ruim. Toma vergonha na cara e estuda.';
      msgInicio = `No dia ${dataFmt} ${frase}`;
    }
    document.getElementById('inicio-data').textContent = msgInicio;
    mostrarTela('screen-inicio');
  } catch (e) {
    location.reload();
  }
}

// ───────────────────────────────────────────────────────────────
// TELAS ESPECIAIS
// ───────────────────────────────────────────────────────────────

function mostrarResumoVazio() {
  mostrarTela('screen-summary');
  document.getElementById('stat-lembrei').textContent = '—';
  document.getElementById('stat-nao').textContent = '—';
  document.getElementById('pct-valor').textContent = '—';
  document.getElementById('summary-emoji').textContent = '🎉 Banco vazio!';
  document.getElementById('summary-data').textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('pct-msg').textContent = 'Nenhum item no banco ainda.';
  document.getElementById('pct-bar').style.width = '0%';
  document.getElementById('sync-status').innerHTML = '';
  document.getElementById('bloco-historico').style.display = 'none';
}



// ───────────────────────────────────────────────────────────────
// REVISÃO
// ───────────────────────────────────────────────────────────────
function iniciarRevisao() {
  mostrarTela('screen-review');
  atualizarCard(false, 'right');
}

function atualizarCard(animar, direcao) {
  const item  = itens[idx];
  const total = itens.length;

  document.getElementById('counter-atual').textContent = idx + 1;
  document.getElementById('counter-total').textContent = total;
  document.getElementById('progress-fill').style.width = ((idx / total) * 100) + '%';
  document.getElementById('card-tema').innerHTML = (item.tema || '—').replace(/\n/g, '<br>');
  document.getElementById('card-text').innerHTML = (item.item || '').replace(/\n/g, '<br>');

  const btnVerImagem = document.getElementById('btn-ver-imagem-wrap');
  if (item.imgTema === 'sim') {
    document.getElementById('lightbox-img-tema-src').value = `imagens/tema_${item.id}.png`;
    btnVerImagem.dataset.temImagem = 'sim';
  } else {
    btnVerImagem.dataset.temImagem = 'nao';
  }
  btnVerImagem.style.display = btnVerImagem.dataset.temImagem === 'sim' ? 'block' : 'none';

  const imgItem = document.getElementById('card-img-item');
  if (item.imgItem === 'sim') {
    const srcItem = `imagens/item_${item.id}.png`;
    imgItem.src = srcItem;
    imgItem.style.display = 'block';
    configurarRetryImagem(imgItem, srcItem); // ← NOVO
  } else {
    imgItem.src = '';
    imgItem.style.display = 'none';
    imgItem.onerror = null;
    imgItem.onload = null;
    // Remove botão de retry se existir
    const retryBtnItem = imgItem.parentElement.querySelector('.img-retry-btn');
    if (retryBtnItem) retryBtnItem.remove();
  }

  const rev = parseInt(item.totalRevisoes) || 0;
  const badgeFront = document.getElementById('card-badge-front');

  if (item.diasAdiantado > 0) {
      badgeFront.className = 'card-badge badge-futuro';
      badgeFront.textContent = `⏭ +${item.diasAdiantado}d adiantado`;
    } else if (rev === 0) {
    badgeFront.className = 'card-badge badge-novo';
    badgeFront.textContent = '✨ Novo item';
    } else {
    badgeFront.className = 'card-badge badge-revisao';
    badgeFront.textContent = `🔁 ${rev}ª revisão`;
    }

  document.getElementById('eval-buttons').classList.add('hidden');

  cardVirado = false;
  const flipCard = document.getElementById('flip-card');

  if (animar) {
    const enterClass = direcao === 'right' ? 'enter-right' : 'enter-left';
    flipCard.classList.add(enterClass);
    flipCard.classList.remove('flipped');
    void flipCard.offsetWidth;
    setTimeout(() => {
      flipCard.classList.remove(enterClass);
      flipCard.style.transition = '';
    }, 30);
  } else {
    flipCard.classList.remove('flipped');
    flipCard.style.transition = 'none';
    void flipCard.offsetWidth;
    flipCard.style.transition = '';
  }
}

function virarCard() {
  if (animando) return; // ← BLOQUEIA DUPLO CLIQUE
  animando = true;      // ← INICIA LOCK

  const flipCard = document.getElementById('flip-card');
  const evalBtns = document.getElementById('eval-buttons');

  if (!cardVirado) {
    cardVirado = true;
    flipCard.classList.add('flipped');
    document.getElementById('btn-ver-imagem-wrap').style.display = 'none';
    setTimeout(() => {
      animando = false;
      evalBtns.classList.remove('hidden');
    }, 350);
  } else {
    animando = true;
    cardVirado = false;
    flipCard.classList.remove('flipped');
    evalBtns.classList.add('hidden');
    setTimeout(() => {
      animando = false;
      const bvi = document.getElementById('btn-ver-imagem-wrap');
      bvi.style.display = bvi.dataset.temImagem === 'sim' ? 'block' : 'none';
    }, 550);
  }
}

async function finalizarSessao(pct, lembrei, naoLembrei) {
  await fetch(APP_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'finalizarSessao', pct, lembrei, naoLembrei }),
    headers: { 'Content-Type': 'text/plain' }
  }).catch(() => {});
}

async function avaliar(resp) {
  if (animando) return;
  animando = true;

  const item      = itens[idx];
  const flipCard  = document.getElementById('flip-card');
  const evalBtns  = document.getElementById('eval-buttons');
  const avaliacao = resp === 'sim' ? 'Lembrei' : 'Não lembrei';

  resultados.push({ id: item.id, avaliacao });

  fetch(APP_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'processarAvaliacoes', resultados: [{ id: item.id, avaliacao }] }),
    headers: { 'Content-Type': 'text/plain' }
  }).catch(() => {});

  const isUltimoItem = (idx + 1) >= itens.length;
  if (isUltimoItem) {
    mostrarTela('screen-loading');
    document.getElementById('loading-msg').textContent = 'Calculando aproveitamento…';
    document.getElementById('block-overlay').classList.add('active');
    const totalLembrei = resultados.filter(r => r.avaliacao === 'Lembrei').length;
    const totalNao     = resultados.filter(r => r.avaliacao === 'Não lembrei').length;
    const totalPct = Math.min(100, Math.round((resultados.length / 40) * 100));
    await finalizarSessao(totalPct, totalLembrei, totalNao);
  }

  evalBtns.classList.add('hidden');
  flipCard.style.transition = 'transform .22s ease, opacity .22s ease';
  flipCard.classList.add('exit-left');

  setTimeout(() => {
    flipCard.classList.remove('exit-left');
    flipCard.style.transition = '';
    animando = false;
    idx++;
    if (idx >= itens.length) mostrarResumo();
    else atualizarCard(true, 'right');
  }, 230);
}

// ───────────────────────────────────────────────────────────────
// RESUMO
// ───────────────────────────────────────────────────────────────
async function mostrarResumo(summaryPreCarregado) {
  mostrarTela('screen-loading');
  document.getElementById('loading-msg').textContent = 'Calculando aproveitamento…';

  let historico = [];
  try {
    // ✅ PREENCHE LACUNAS ANTES DE BUSCAR O HISTÓRICO
    await fetch(`${APP_URL}?action=preencherLacunas`).catch(() => {});
    
    const data = summaryPreCarregado || await fetch(`${APP_URL}?action=getSummary`).then(r => r.json());
    historico = data.historico || [];
  } catch (e) {
    historico = [];
  }

  const hoje = historico.find(h => h.data === new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '/'));
  const lembrei = hoje ? hoje.lembrei : 0;
  const nao = hoje ? hoje.naoLembrei : 0;
  const total = lembrei + nao;
  const pct = Math.min(100, Math.round((total / 40) * 100));

  document.getElementById('stat-lembrei').textContent = total > 0 ? lembrei : '—';
  document.getElementById('stat-nao').textContent     = total > 0 ? nao     : '—';
  document.getElementById('pct-valor').textContent    = total > 0 ? pct + '%' : '—';
  document.getElementById('summary-data').textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

  let emoji = '📊';
  document.getElementById('summary-emoji').textContent = emoji + ' HISTÓRICO';
  document.getElementById('pct-msg').textContent = '';

  document.getElementById('sync-status').innerHTML = total > 0
    ? '<span style="color:var(--green)">✓ Itens salvos automaticamente</span>'
    : '';
  document.getElementById('btn-voltar-menu').style.display = '';

  const barEl    = document.getElementById('pct-bar');
  const barColor = pct < 50 ? '#ff5f6d' : pct < 75 ? '#f5a623' : '#2ecc8a';
  barEl.style.background = barColor;
  barEl.style.transition = 'none';
  barEl.style.width      = '0%';

  renderizarHistorico(historico);

  mostrarTela('screen-summary');
  setTimeout(() => {
    barEl.style.transition = 'width 1s ease';
    barEl.style.width      = (total > 0 ? pct : 0) + '%';
  }, 100);
}

// ───────────────────────────────────────────────────────────────
// HISTÓRICO
// ───────────────────────────────────────────────────────────────
function renderizarHistorico(historico) {
  const bloco = document.getElementById('bloco-historico');
  if (!historico || historico.length === 0) {
    bloco.style.display = 'none';
    return;
  }

  bloco.style.display = 'block';

  const media = Math.round(historico.reduce((acc, h) => acc + h.pct, 0) / historico.length);
  const dias  = historico.length;
  document.getElementById('hist-media').textContent = `Média: ${media}%`;
  document.getElementById('hist-dias').textContent  = `${dias} dia${dias !== 1 ? 's' : ''} de revisão`;

  const barsEl = document.getElementById('hist-bars');
  barsEl.innerHTML = '';

  const hoje = new Date();
  for (let i = 6; i >= 0; i--) {
    const dia = new Date(hoje);
    dia.setDate(hoje.getDate() - i);
    const label   = `${String(dia.getDate()).padStart(2,'0')}/${String(dia.getMonth()+1).padStart(2,'0')}`;
    const dataStr = `${label}/${dia.getFullYear()}`;
    const h = historico.find(x => x.data === dataStr);

    const wrap = document.createElement('div');
    wrap.className = 'hist-bar-wrap';

    const pctLabel = document.createElement('div');
    pctLabel.className = 'hist-bar-label';
    pctLabel.style.marginBottom = '4px';
    pctLabel.style.color = 'var(--text-muted)';
    pctLabel.textContent = h ? `${h.pct}%` : '';

    const bar = document.createElement('div');
    bar.className = 'hist-bar';

    if (h) {
      const cor = h.pct >= 75 ? 'var(--green)' : h.pct >= 50 ? 'var(--orange)' : 'var(--red)';
      bar.style.background = cor;
      bar.style.height     = `${Math.max(6, Math.round((h.pct / 100) * 188))}px`;
      pctLabel.style.color = cor;
    } else {
      bar.style.background = 'var(--border)';
      bar.style.height     = '4px';
    }

    const dayLabel = document.createElement('div');
    dayLabel.className   = 'hist-bar-label';
    dayLabel.textContent = label;

    wrap.appendChild(pctLabel);
    wrap.appendChild(bar);
    wrap.appendChild(dayLabel);
    barsEl.appendChild(wrap);
  }
}

function iniciarRevisaoDiaria() {
  if (!itens || itens.length === 0) {
    mostrarResumo();
    return;
  }
  iniciarRevisao();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function abrirLightbox(e, src) {
  e.stopPropagation();
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}

function fecharLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.getElementById('lightbox-img').src = '';
}

function voltarAoMenu() {
  document.getElementById('btn-voltar-menu').style.display = 'none';
  carregarItens();
}

window.addEventListener('load', () => { carregarItens(); });
</script>
