<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REVISÃO KARU</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3d;
    --text: #e8eaf2;
    --text-muted: #6b7191;
    --text-dim: #3d4260;
    --green: #2ecc8a;
    --green-bg: #0d2b1e;
    --green-border: #1a4d35;
    --red: #ff5f6d;
    --red-bg: #2b0d12;
    --red-border: #4d1a1f;
    --accent: #7c8cf8;
    --accent-dim: #2a2f55;
    --orange: #f5a623;
    --orange-bg: #2b1f0d;
    --orange-border: #4d3a1a;
    --radius: 20px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: fixed;
    width: 100%;
    font-size: 20px;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 16px) 20px env(safe-area-inset-bottom, 16px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  .btn {
    border: none;
    border-radius: var(--radius);
    padding: 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s, opacity .15s;
    width: 100%;
  }
  .btn:active { transform: scale(0.97); opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    font-size: 19px;
    padding: 14px;
  }

  #screen-loading { justify-content: center; align-items: center; gap: 20px; text-align: center; }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #screen-loading p { color: var(--text-muted); font-size: 20px; }

  #screen-review { gap: 0; padding-bottom: 0; overflow-y: auto; }

  .review-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
    flex-shrink: 0;
  }
  .review-counter { font-size: 19px; font-weight: 600; color: var(--text-muted); }
  .review-counter span { color: var(--text); }

  .treino-badge {
    font-size: 15px;
    font-weight: 600;
    color: var(--orange);
    background: var(--orange-bg);
    border: 1px solid var(--orange-border);
    padding: 5px 14px;
    border-radius: 20px;
  }

  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    flex-shrink: 0;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px;
    transition: width .4s ease;
  }
  .progress-fill.treino {
    background: linear-gradient(90deg, var(--orange), #f5d623);
  }

  .card-area {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1200px;
    padding: 8px 0;
  }

  .flip-card {
    width: 100%;
    max-width: 440px;
    height: 540px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .flip-card.flipped { transform: rotateY(180deg); }
  .flip-card.exit-left {
    transform: translateX(-80px) rotate(-5deg);
    opacity: 0;
    transition: transform .22s ease, opacity .22s ease;
  }
  .flip-card.exit-right {
    transform: translateX(80px) rotate(5deg);
    opacity: 0;
    transition: transform .22s ease, opacity .22s ease;
  }
  .flip-card.enter-right {
    transform: translateX(80px) rotate(5deg);
    opacity: 0;
    transition: none;
  }
  .flip-card.enter-left {
    transform: translateX(-80px) rotate(-5deg);
    opacity: 0;
    transition: none;
  }

  .card-face {
    position: absolute;
    inset: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow-y: auto;
  }
  .card-back {
    transform: rotateY(180deg);
    background: var(--surface2);
    border-color: var(--accent);
    justify-content: center;
  }
  .card-face-content {
    font-size: 24px;
    line-height: 1.5;
    color: var(--text);
    font-weight: 400;
    text-align: center;
  }
  .card-front .card-face-content {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    color: var(--accent);
  }
  .card-tap-hint {
    font-size: 15px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    justify-content: center;
  }
  .card-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
    width: fit-content;
  }
  .badge-novo { background: var(--accent-dim); color: var(--accent); }
  .badge-revisao { background: var(--green-bg); color: var(--green); }
  .badge-treino { background: var(--orange-bg); color: var(--orange); }

  /* ── Imagens nos cards ── */
  .card-img {
    max-width: 100%;
    max-height: 220px;
    object-fit: contain;
    border-radius: var(--radius-sm);
    margin: 8px auto 0;
    display: block;
    cursor: zoom-in;
  }

  /* ── Lightbox ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.active { display: flex; }
  #lightbox img {
    max-width: 95vw;
    max-height: 95vh;
    object-fit: contain;
    border-radius: var(--radius-sm);
  }

  .eval-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 8px 0 max(12px, env(safe-area-inset-bottom));
    flex-shrink: 0;
    transition: opacity .3s ease;
  }
  .eval-buttons.hidden { display: none; }

  .btn-eval {
    border: none;
    border-radius: var(--radius);
    padding: 16px 16px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: transform .15s, filter .15s;
  }
  .btn-eval:active { transform: scale(0.95); }
  .btn-eval .eval-icon { font-size: 28px; }
  .btn-eval .eval-label { font-size: 18px; }
  .btn-lembrei { background: var(--green-bg); border: 1.5px solid var(--green-border); color: var(--green); }
  .btn-lembrei:active { filter: brightness(1.2); }
  .btn-nao-lembrei { background: var(--red-bg); border: 1.5px solid var(--red-border); color: var(--red); }
  .btn-nao-lembrei:active { filter: brightness(1.2); }

  .nav-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 10px;
    padding: 8px 0 max(12px, env(safe-area-inset-bottom));
    flex-shrink: 0;
    transition: opacity .3s ease;
  }
  .nav-buttons.hidden  { display: none; }

  .btn-nav {
    border: 1.5px solid var(--orange-border);
    border-radius: var(--radius);
    padding: 16px 16px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: transform .15s, filter .15s;
    background: var(--orange-bg);
    color: var(--orange);
  }
  .btn-nav:active { transform: scale(0.95); filter: brightness(1.2); }
  .btn-nav .nav-icon { font-size: 28px; }
  .btn-nav .nav-label { font-size: 18px; }
  .btn-nav:disabled { opacity: 0.3; pointer-events: none; }

  .nav-sair {
    padding: 0 0 max(16px, env(safe-area-inset-bottom));
    flex-shrink: 0;
    transition: opacity .3s ease;
  }
  .nav-sair.hidden { opacity: 0; pointer-events: none; }

  #screen-summary {
    gap: 14px;
    padding-top: 32px;
    overflow-y: auto;
  }

  .summary-header { text-align: center; flex-shrink: 0; }
  .summary-header h2 { font-family: 'DM Serif Display', serif; font-size: 40px; }
  .summary-header p { color: var(--text-muted); font-size: 19px; margin-top: 6px; }

  .summary-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; flex-shrink: 0; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
  }
  .stat-number { font-family: 'DM Serif Display', serif; font-size: 48px; line-height: 1; }
  .stat-number.green { color: var(--green); }
  .stat-number.red { color: var(--red); }
  .stat-label { font-size: 15px; color: var(--text-muted); margin-top: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; }

  .summary-pct {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    flex-shrink: 0;
  }
  .pct-bar-bg { height: 10px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin: 12px 0 10px; }
  .pct-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease, background-color 0.5s ease; }
  .pct-label { display: flex; justify-content: space-between; font-size: 18px; color: var(--text-muted); }
  .pct-label strong { color: var(--text); font-size: 20px; }

  .summary-historico {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    flex-shrink: 0;
  }
  .hist-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .hist-media { font-size: 22px; font-weight: 600; color: var(--accent); }
  .hist-dias { font-size: 18px; color: var(--text-muted); margin-top: 2px; }

  .hist-bars {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 100px;
    margin-top: 14px;
  }
  .hist-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    height: 100%;
    justify-content: flex-end;
  }
  .hist-bar {
    width: 100%;
    border-radius: 4px 4px 0 0;
    min-height: 4px;
  }
  .hist-bar-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  .summary-syncing {
    text-align: center; font-size: 18px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    flex-shrink: 0;
  }

  .summary-actions {
    display: flex; flex-direction: column; gap: 10px;
    margin-top: auto;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    flex-shrink: 0;
  }

  .toast {
    position: fixed; bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 14px 24px; border-radius: 30px;
    font-size: 18px; opacity: 0; transition: all .3s ease; white-space: nowrap; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="screen active" id="screen-loading">
  <div class="spinner"></div>
  <p id="loading-msg">Carregando itens do dia…</p>
</div>

<div class="screen" id="screen-review">
  <div class="review-header">
    <div class="review-counter"><span id="counter-atual">1</span> de <span id="counter-total">0</span></div>
    <div class="treino-badge" id="treino-badge" style="display:none">🎯 Modo Treino</div>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="card-area">
    <div class="flip-card" id="flip-card" onclick="virarCard()">
      <div class="card-face card-front">
        <div class="card-badge" id="card-badge-front"></div>
        <div class="card-face-content" id="card-tema">—</div>
        <img class="card-img" id="card-img-tema" src="" alt="" style="display:none" onclick="abrirLightbox(event, this.src)">
        <div class="card-tap-hint">👆 TOQUE PARA SABER MAIS 👆</div>
      </div>
      <div class="card-face card-back">
        <div class="card-face-content" id="card-text">—</div>
        <img class="card-img" id="card-img-item" src="" alt="" style="display:none" onclick="abrirLightbox(event, this.src)">
      </div>
    </div>
  </div>
  <div class="eval-buttons hidden" id="eval-buttons">
    <button class="btn-eval btn-nao-lembrei" onclick="avaliar('nao')">
      <span class="eval-icon">✕</span>
      <span class="eval-label">Não lembrei</span>
    </button>
    <button class="btn-eval btn-lembrei" onclick="avaliar('sim')">
      <span class="eval-icon">✓</span>
      <span class="eval-label">Lembrei</span>
    </button>
  </div>
  <div class="nav-buttons hidden" id="nav-buttons">
    <button class="btn-nav" id="btn-anterior" onclick="navegarTreino(-1)">
      <span class="nav-icon">←</span>
      <span class="nav-label">Anterior</span>
    </button>
    <button class="btn-nav" id="btn-proximo" onclick="navegarTreino(1)">
      <span class="nav-icon">→</span>
      <span class="nav-label">Próximo</span>
    </button>
  </div>
  <div class="nav-sair hidden" id="nav-sair">
    <button class="btn btn-ghost" onclick="sairDoTreino()">Sair do treino</button>
  </div>
</div>

<div class="screen" id="screen-summary">
  <div class="summary-header">
    <h2 id="summary-emoji">✅ Revisão concluída!</h2>
    <p id="summary-data"></p>
  </div>
  <div class="summary-stats">
    <div class="stat-card">
      <div class="stat-number green" id="stat-lembrei">0</div>
      <div class="stat-label">Lembrei</div>
    </div>
    <div class="stat-card">
      <div class="stat-number red" id="stat-nao">0</div>
      <div class="stat-label">Não lembrei</div>
    </div>
  </div>
  <div class="summary-pct">
    <div class="pct-label">
      <span>Hoje</span>
      <strong id="pct-valor">0%</strong>
    </div>
    <div class="pct-bar-bg">
      <div class="pct-bar-fill" id="pct-bar" style="width:0%"></div>
    </div>
    <div class="pct-label"><span id="pct-msg">—</span></div>
  </div>
  <div class="summary-historico" id="bloco-historico" style="display:none">
    <div class="hist-title">
      <span>📊 Histórico</span>
      <span class="hist-media" id="hist-media">—</span>
    </div>
    <div class="hist-dias" id="hist-dias">—</div>
    <div class="hist-bars" id="hist-bars"></div>
  </div>
  <div class="summary-syncing" id="sync-status"></div>
  <div class="summary-actions">
    <button class="btn btn-primary" id="btn-nova-rodada" onclick="novaRodada()">Revisar novamente hoje</button>
  </div>
</div>

<div id="lightbox" onclick="fecharLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script>
const APP_URL = 'https://script.google.com/macros/s/AKfycbymffK7phd3WRnxArNHXTlXJu23RdJtGSGncxAXq8kY520l_5wUEyeb91koMij4ask1xQ/exec';

let itens = [];
let idx = 0;
let resultados = [];
let cardVirado = false;
let modoTreino = false;
let idsVistosTreino = [];

function mostrarTela(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function embaralhar(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function carregarItens() {
  mostrarTela('screen-loading');
  document.getElementById('loading-msg').textContent = 'Carregando itens do dia…';
  try {
    const [resItens, resHoje] = await Promise.all([
      fetch(`${APP_URL}?action=getItens`, { method: 'GET' }),
      fetch(`${APP_URL}?action=getAvaliacoesHoje`, { method: 'GET' })
    ]);
    const dataItens = await resItens.json();
    const dataHoje = await resHoje.json();

    resultados = (dataHoje.avaliacoes || []).map(a => ({ id: a.id, avaliacao: a.avaliacao }));

    if (dataItens.itens && dataItens.itens.length > 0) {
      itens = dataItens.itens;
      idx = 0;
      modoTreino = false;
      iniciarRevisao();
    } else {
      if (resultados.length > 0) {
        mostrarResumo();
      } else {
        mostrarDiaLivre();
      }
    }
  } catch (e) {
    alert('Erro ao conectar com o Apps Script.\n\nVerifique:\n• Permissões configuradas como "Qualquer pessoa"\n• Planilha tem itens com "Status = Ativo"');
    mostrarTela('screen-loading');
  }
}

async function carregarTreino() {
  mostrarTela('screen-loading');
  document.getElementById('loading-msg').textContent = 'Preparando modo treino…';
  try {
    const [resTodos, resFila] = await Promise.all([
      fetch(`${APP_URL}?action=getTodosItens`, { method: 'GET' }),
      fetch(`${APP_URL}?action=getFilaTreino`, { method: 'GET' })
    ]);
    const dataTodos = await resTodos.json();
    const dataFila = await resFila.json();

    if (!dataTodos.itens || dataTodos.itens.length === 0) {
      mostrarResumoVazio();
      return;
    }

    const todosIds = dataTodos.itens.map(i => String(i.id));
    const vistos = (dataFila.ids || []).map(String);

    let pendentes = dataTodos.itens.filter(i => !vistos.includes(String(i.id)));

    if (pendentes.length === 0) {
      await fetch(APP_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'zerarFilaTreino' }),
        headers: { 'Content-Type': 'text/plain' }
      });
      pendentes = dataTodos.itens;
    }

    itens = embaralhar(pendentes);
    idsVistosTreino = vistos;
    idx = 0;
    resultados = [];
    modoTreino = true;
    iniciarRevisao();
  } catch (e) {
    mostrarResumoVazio();
  }
}

function mostrarDiaLivre() {
  mostrarTela('screen-summary');
  document.getElementById('stat-lembrei').textContent = '—';
  document.getElementById('stat-nao').textContent = '—';
  document.getElementById('pct-valor').textContent = '—';
  document.getElementById('summary-emoji').textContent = '🎉 Dia livre!';
  document.getElementById('summary-data').textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('pct-msg').textContent = 'Nenhum item para revisar hoje. Volte amanhã!';
  document.getElementById('pct-bar').style.width = '100%';
  document.getElementById('sync-status').innerHTML = '';
  document.getElementById('btn-nova-rodada').textContent = '🎯 Entrar no modo treino';
  document.getElementById('btn-nova-rodada').dataset.action = 'treino';
  carregarEExibirHistorico();
}

function mostrarResumoVazio() {
  mostrarTela('screen-summary');
  document.getElementById('stat-lembrei').textContent = '—';
  document.getElementById('stat-nao').textContent = '—';
  document.getElementById('pct-valor').textContent = '—';
  document.getElementById('summary-emoji').textContent = '🎉 Banco vazio!';
  document.getElementById('summary-data').textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
  document.getElementById('pct-msg').textContent = 'Nenhum item no banco ainda.';
  document.getElementById('pct-bar').style.width = '0%';
  document.getElementById('sync-status').innerHTML = '';
  document.getElementById('btn-nova-rodada').textContent = 'Tentar novamente';
  document.getElementById('bloco-historico').style.display = 'none';
}

function iniciarRevisao() {
  mostrarTela('screen-review');
  document.getElementById('treino-badge').style.display = modoTreino ? 'block' : 'none';
  const pf = document.getElementById('progress-fill');
  pf.className = 'progress-fill' + (modoTreino ? ' treino' : '');
  atualizarCard(false, 'right');
}

function atualizarCard(animar, direcao) {
  const item = itens[idx];
  const total = itens.length;

  document.getElementById('counter-atual').textContent = idx + 1;
  document.getElementById('counter-total').textContent = total;
  document.getElementById('progress-fill').style.width = ((idx / total) * 100) + '%';
  document.getElementById('card-tema').innerHTML = (item.tema || '—').replace(/\n/g, '<br>');
  document.getElementById('card-text').innerHTML = (item.item || '').replace(/\n/g, '<br>');

  // ── Imagem da frente (IMG Tema) ──
  const imgTema = document.getElementById('card-img-tema');
  if (item.imgTema === 'sim') {
    imgTema.src = `imagens/tema_${item.id}.png`;
    imgTema.style.display = 'block';
  } else {
    imgTema.src = '';
    imgTema.style.display = 'none';
  }

  // ── Imagem do verso (IMG Item) ──
  const imgItem = document.getElementById('card-img-item');
  if (item.imgItem === 'sim') {
    imgItem.src = `imagens/item_${item.id}.png`;
    imgItem.style.display = 'block';
  } else {
    imgItem.src = '';
    imgItem.style.display = 'none';
  }

  const rev = parseInt(item.totalRevisoes) || 0;
  const badgeFront = document.getElementById('card-badge-front');

  if (modoTreino) {
    badgeFront.className = 'card-badge badge-treino';
    badgeFront.textContent = '🎯 Treino';
  } else if (rev === 0) {
    badgeFront.className = 'card-badge badge-novo';
    badgeFront.textContent = '✨ Novo item';
  } else {
    badgeFront.className = 'card-badge badge-revisao';
    badgeFront.textContent = `🔁 ${rev}ª revisão`;
  }

  document.getElementById('eval-buttons').classList.add('hidden');
  document.getElementById('nav-buttons').classList.add('hidden');
  document.getElementById('nav-sair').classList.add('hidden');

  if (modoTreino) {
    document.getElementById('btn-anterior').disabled = idx === 0;
  }

  cardVirado = false;
  const flipCard = document.getElementById('flip-card');

  if (animar) {
    const enterClass = direcao === 'right' ? 'enter-right' : 'enter-left';
    flipCard.classList.add(enterClass);
    flipCard.classList.remove('flipped');
    void flipCard.offsetWidth;
    setTimeout(() => {
      flipCard.classList.remove(enterClass);
      flipCard.style.transition = '';
    }, 30);
  } else {
    flipCard.classList.remove('flipped');
    flipCard.style.transition = 'none';
    void flipCard.offsetWidth;
    flipCard.style.transition = '';
  }
}

function virarCard() {
  const flipCard = document.getElementById('flip-card');
  const evalBtns = document.getElementById('eval-buttons');
  const navBtns = document.getElementById('nav-buttons');

  if (!cardVirado) {
    cardVirado = true;
    flipCard.classList.add('flipped');
    setTimeout(() => {
      if (modoTreino) {
        navBtns.classList.remove('hidden');
        document.getElementById('nav-sair').classList.remove('hidden');
      } else {
        evalBtns.classList.remove('hidden');
      }
    }, 350);
  } else {
    cardVirado = false;
    flipCard.classList.remove('flipped');
    evalBtns.classList.add('hidden');
    navBtns.classList.add('hidden');
    document.getElementById('nav-sair').classList.add('hidden');
  }
}

function navegarTreino(direcao) {
  const flipCard = document.getElementById('flip-card');
  document.getElementById('nav-buttons').classList.add('hidden');
  document.getElementById('nav-sair').classList.add('hidden');

  if (direcao === 1 && !idsVistosTreino.includes(String(itens[idx].id))) {
    idsVistosTreino.push(String(itens[idx].id));
    registrarVistoTreino(itens[idx].id);
  }

  const exitClass = direcao === 1 ? 'exit-left' : 'exit-right';
  flipCard.style.transition = 'transform .22s ease, opacity .22s ease';
  flipCard.classList.add(exitClass);

  setTimeout(() => {
    flipCard.classList.remove(exitClass);
    flipCard.style.transition = '';
    const novoIdx = idx + direcao;
    if (novoIdx >= itens.length) {
      mostrarResumo();
    } else if (novoIdx < 0) {
      atualizarCard(true, 'right');
    } else {
      idx = novoIdx;
      atualizarCard(true, direcao === 1 ? 'right' : 'left');
    }
  }, 230);
}

function registrarVistoTreino(id) {
  fetch(APP_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'adicionarFilaTreino', id: String(id) }),
    headers: { 'Content-Type': 'text/plain' }
  }).catch(() => {});
}

function finalizarSessao(pct, lembrei, naoLembrei) {
  if (modoTreino) return;
  fetch(APP_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'finalizarSessao', pct, lembrei, naoLembrei }),
    headers: { 'Content-Type': 'text/plain' }
  }).catch(() => {});
}

function avaliar(resp) {
  const item = itens[idx];
  const flipCard = document.getElementById('flip-card');
  const evalBtns = document.getElementById('eval-buttons');
  const avaliacao = resp === 'sim' ? 'Lembrei' : 'Não lembrei';

  resultados.push({ id: item.id, avaliacao });

  const lembrei = resultados.filter(r => r.avaliacao === 'Lembrei').length;
  const nao = resultados.filter(r => r.avaliacao === 'Não lembrei').length;
  const pct = Math.round((lembrei / resultados.length) * 100);

  fetch(APP_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'processarAvaliacoes', resultados: [{ id: item.id, avaliacao }] }),
    headers: { 'Content-Type': 'text/plain' }
  }).catch(() => {});

  finalizarSessao(pct, lembrei, nao);

  evalBtns.classList.add('hidden');
  flipCard.style.transition = 'transform .22s ease, opacity .22s ease';
  flipCard.classList.add('exit-left');

  setTimeout(() => {
    flipCard.classList.remove('exit-left');
    flipCard.style.transition = '';
    idx++;
    if (idx >= itens.length) mostrarResumo();
    else atualizarCard(true, 'right');
  }, 230);
}

async function carregarEExibirHistorico() {
  try {
    const res = await fetch(`${APP_URL}?action=getHistorico`, { method: 'GET' });
    const data = await res.json();
    renderizarHistorico(data.historico || []);
  } catch (e) {
    document.getElementById('bloco-historico').style.display = 'none';
  }
}

function renderizarHistorico(historico) {
  const bloco = document.getElementById('bloco-historico');
  if (!historico || historico.length === 0) {
    bloco.style.display = 'none';
    return;
  }

  bloco.style.display = 'block';

  const media = Math.round(historico.reduce((acc, h) => acc + h.pct, 0) / historico.length);
  const dias = historico.length;
  document.getElementById('hist-media').textContent = `Média: ${media}%`;
  document.getElementById('hist-dias').textContent = `${dias} dia${dias !== 1 ? 's' : ''} de revisão`;

  const barsEl = document.getElementById('hist-bars');
  barsEl.innerHTML = '';

  const hoje = new Date();
  for (let i = 6; i >= 0; i--) {
    const dia = new Date(hoje);
    dia.setDate(hoje.getDate() - i);
    const label = `${String(dia.getDate()).padStart(2,'0')}/${String(dia.getMonth()+1).padStart(2,'0')}`;
    const dataStr = `${label}/${dia.getFullYear()}`;
    const h = historico.find(x => x.data === dataStr);

    const wrap = document.createElement('div');
    wrap.className = 'hist-bar-wrap';

    const bar = document.createElement('div');
    bar.className = 'hist-bar';

    if (h) {
      const cor = h.pct >= 75 ? 'var(--green)' : h.pct >= 50 ? 'var(--orange)' : 'var(--red)';
      bar.style.background = cor;
      bar.style.height = `${Math.max(6, Math.round((h.pct / 100) * 88))}px`;
      bar.title = `${label}: ${h.pct}%`;
    } else {
      bar.style.background = 'var(--border)';
      bar.style.height = '4px';
      bar.title = `${label}: sem revisão`;
    }

    const lbl = document.createElement('div');
    lbl.className = 'hist-bar-label';
    lbl.textContent = label;

    wrap.appendChild(bar);
    wrap.appendChild(lbl);
    barsEl.appendChild(wrap);
  }
}

async function mostrarResumo() {
  mostrarTela('screen-loading');
  document.getElementById('loading-msg').textContent = 'Calculando aproveitamento…';

  if (resultados.length === 0) {
    try {
      const res = await fetch(`${APP_URL}?action=getAvaliacoesHoje`, { method: 'GET' });
      const data = await res.json();
      if (data.avaliacoes && data.avaliacoes.length > 0) {
        resultados = data.avaliacoes.map(a => ({ id: a.id, avaliacao: a.avaliacao }));
      }
    } catch (e) {}
  }

  const lembrei = resultados.filter(r => r.avaliacao === 'Lembrei').length;
  const nao = resultados.filter(r => r.avaliacao === 'Não lembrei').length;
  const total = resultados.length;
  const pct = total > 0 ? Math.round((lembrei / total) * 100) : 0;

  document.getElementById('stat-lembrei').textContent = total > 0 ? lembrei : '—';
  document.getElementById('stat-nao').textContent = total > 0 ? nao : '—';
  document.getElementById('pct-valor').textContent = total > 0 ? pct + '%' : '—';
  document.getElementById('summary-data').textContent = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

  let emoji = '✅', msg = '';
  if (total === 0) {
    emoji = '🎉'; msg = 'Nenhuma revisão feita ainda hoje.';
  } else if (pct >= 90) { emoji = '🔥'; msg = 'Excelente! Você está dominando o conteúdo.'; }
  else if (pct >= 70) { emoji = '✅'; msg = 'Ótimo desempenho! Continue assim.'; }
  else if (pct >= 50) { emoji = '💪'; msg = 'Bom esforço. Os itens difíceis voltarão em breve.'; }
  else { emoji = '📚'; msg = 'Não desanime! A repetição vai consolidar o conteúdo.'; }

  document.getElementById('summary-emoji').textContent = emoji + ' Revisão concluída!';
  document.getElementById('pct-msg').textContent = msg;
  document.getElementById('sync-status').innerHTML = total > 0
    ? '<span style="color:var(--green)">✓ Itens salvos automaticamente</span>'
    : '';
  document.getElementById('btn-nova-rodada').textContent = '🎯 Entrar no modo treino';
  document.getElementById('btn-nova-rodada').dataset.action = 'treino';

  const barEl = document.getElementById('pct-bar');
  const barColor = pct < 50 ? '#ff5f6d' : pct < 75 ? '#f5a623' : '#2ecc8a';
  barEl.style.background = barColor;

  barEl.style.transition = 'none';
  barEl.style.width = '0%';
  await carregarEExibirHistorico();
  mostrarTela('screen-summary');
  setTimeout(() => {
    barEl.style.transition = 'width 1s ease';
    barEl.style.width = (total > 0 ? pct : 0) + '%';
  }, 100);
}

function sairDoTreino() {
  mostrarResumo();
}

async function novaRodada() {
  const btn = document.getElementById('btn-nova-rodada');
  if (btn.dataset.action === 'treino') {
    btn.dataset.action = '';
    await carregarTreino();
  } else {
    await carregarItens();
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function abrirLightbox(e, src) {
  e.stopPropagation();
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}

function fecharLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.getElementById('lightbox-img').src = '';
}

window.addEventListener('load', () => { carregarItens(); });
</script>
